{% extends "main.html" %}

{% block content %}
<style>
    #grid {
      margin-left: auto;
      margin-right: auto;
      transform: rotate(-90deg);
    }

    #grid TR TD{
      border:1px solid white;
      background: #FFFFFF;
      width: 30px;
      height: 30px;
      text-align: center;
    }

    #grid TR TD:hover {
        background: #333333;
    }

    #grid TR TD.owner {
        background: #00FF00;
    }

    #grid TR TD.enemy {
        background: #FF0000;
    }

    #grid TR TD.tribe {
        background: #0001FF;
    }

    #grid TR TD.barbarian {
        background: #AAAAAA;
    }
</style>
<div class="row">
        <div class="col-lg-10">
                <div style="margin-bottom:10px"><button id="refresh_map" class="btn btn-gold btn-sm">Odśwież mapę</button></div>
                <div class="card">
                    <div class="card-body">
                        <table id="grid"></table>
                    </div>
                </div>
        </div>
        <div class="col-lg-2">
                <div class="card">
                    <div class="card-header panel-decor">Szczegóły</div>
                    <div class="card-body">
                        <h5 id="v_name" class="gold-underline"></h5>
                        <p id="v_data" class="muted"></p>
                    </div>
                </div>
        </div>

</div>
{% endblock %}

{% block scripts %}
<script>
    var map_data = {{map | safe}};
    var grid = document.getElementById('grid');
    function generateGrid(x, y, data) {
        grid.innerHTML = "";
        for (var i = 0; i < x; i++) {
            row = grid.insertRow(i);
            for (var j = 0; j < y; j++) {
                cell = row.insertCell(j);

                if (i in data.grid && j in data.grid[i] && data.grid[i][j]) {
                    var village = data.grid[i][j];
                    cell.onclick = function() { clickCell(this); };
                    cell.onmouseover = function() { clickCell(this); };
                    if (village.owner != "0") {
                        cell.setAttribute("village", JSON.stringify(village));
                        if (data.extra && village.owner == data.extra.owner) {
                            cell.setAttribute("class", "owner");
                        } else if (data.extra && data.extra.tribe != "0" && data.extra.tribe == village.tribe) {
                            cell.setAttribute("class", "tribe");
                        } else {
                            cell.setAttribute("class", "enemy");
                        }
                    } else {
                        cell.setAttribute("class", "barbarian");
                    }
                }
            }
        }
    }

    function clickCell(cell) {
        var village_data = $(cell).attr("village");
        if (!village_data) return;
        var data = JSON.parse(village_data);
        $('#v_name').text(data.name);

        var output = '';
        $.each(data, function(k, v) {
            if (jQuery.type(v) !== "object") {
                output += '<strong>' + k + '</strong> ' + v + '<br />';
            }
        });
        $('#v_data').html(output);
    }

    if (!map_data || !map_data.grid || Object.keys(map_data.grid).length === 0) {
        $('#grid').html('<tr><td>Brak danych mapy</td></tr>');
    } else {
        generateGrid(Object.keys(map_data.grid).length, Object.keys(map_data.grid).length, map_data);
    }

    $('#refresh_map').on('click', function() {
        $(this).prop('disabled', true).text('Odświeżanie...');
        $.get('/map/refresh').done(function(res){
            location.reload();
        }).fail(function(err){
            alert('Błąd odświeżania mapy: ' + (err.responseJSON && err.responseJSON.error ? err.responseJSON.error : 'nieznany'));
            $('#refresh_map').prop('disabled', false).text('Odśwież mapę');
        });
    });

    function autoRefreshMap() {
        if (!map_data || !map_data.grid || Object.keys(map_data.grid).length === 0) {
            $.get('/map/refresh').done(function(res){
                if (res && res.status && res.status === 'ok' && res.refreshed && res.refreshed.length > 0) {
                    location.reload();
                }
            });
        }
    }

    // Poll periodically and only reload when the server reports refreshed map data
    setInterval(autoRefreshMap, 5000);
</script>
{% endblock %}
